name: Test Deploy Services Action

on:
  push:
    branches:
      - main

jobs:
  test-action:
    name: Test Deploy Services Action
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Test Deploy Services Action
        id: test-action
        uses: ./shared-actions/deploy-services
        with:
          project_id: ai2-skiff2-example
          repo_name: skiff2-actions-build-test
          config_file: ./shared-actions/deploy-services/test/test-skiff2-config.json
          command: plan
          environment: null
