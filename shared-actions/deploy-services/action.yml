name: Skiff2 Deploy Services
description: Transforms skiff2.json config into Terraform variables and runs terraform plan or apply for Cloud Run services
author: Skiff

inputs:
  project_id:
    description: "GCP project ID"
    required: true
  config_file:
    description: "Path to skiff2.json config file (relative to calling repo root)"
    required: false
    default: "skiff2.json"
  region:
    description: "GCP region"
    required: false
    default: "us-west1"
  repo_name:
    description: "Repository name (defaults to github.event.repository.name)"
    required: false
    default: ${{ github.event.repository.name }}
  command:
    description: "Terraform command to run: 'plan' or 'apply'"
    required: false
    default: "plan"
  environment:
    description: "Target environment to deploy (e.g. 'main', 'qa')."
    required: false
    default: ${{ github.ref_name }}
  services:
    description: "Comma-separated list of service names to deploy (defaults to all services)"
    required: false
    default: ""
  deploy_tag:
    description: "Deploy tag to use as image tag (defaults to github.sha)"
    required: false
    default: ${{ github.sha }}

outputs:
  default_url:
    description: "Default load balancer URL for the project"
    value: ${{ steps.transform.outputs.default_url }}

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Install action dependencies
      shell: bash
      working-directory: ${{ github.action_path }}/../
      run: npm ci

    - name: Transform config to Terraform variables
      id: transform
      shell: bash
      working-directory: ${{ github.action_path }}/../
      env:
        INPUT_CONFIG_FILE: ${{ inputs.config_file }}
        INPUT_PROJECT_ID: ${{ inputs.project_id }}
        INPUT_REGION: ${{ inputs.region }}
        INPUT_REPO_NAME: ${{ inputs.repo_name }}
        INPUT_ENVIRONMENT: ${{ inputs.environment }}
        INPUT_SERVICES: ${{ inputs.services }}
        INPUT_DEPLOY_TAG: ${{ inputs.deploy_tag }}
        TERRAFORM_DIR: ${{ github.action_path }}/../../project-terraform/services
      run: node ./deploy-services/index.ts

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      shell: bash
      working-directory: ${{ github.action_path }}/../../project-terraform/services
      run: terraform init -backend-config="bucket=${{ inputs.project_id }}-tf-state"

    - name: Select Terraform Workspace
      shell: bash
      working-directory: ${{ github.action_path }}/../../project-terraform/services
      run: terraform workspace select -or-create ${{ steps.transform.outputs.workspace }}

    - name: Terraform ${{ inputs.command == 'apply' && 'Apply' || 'Plan' }}
      id: terraform
      shell: bash
      working-directory: ${{ github.action_path }}/../../project-terraform/services
      run: |
        if [ "${{ inputs.command }}" = "apply" ]; then
          terraform apply -input=false -auto-approve
        else
          terraform plan -input=false
        fi

    - name: Cleanup deleted environments
      if: inputs.environment == 'main'
      shell: bash
      working-directory: ${{ github.action_path }}/../
      env:
        INPUT_CONFIG_FILE: ${{ inputs.config_file }}
        INPUT_PROJECT_ID: ${{ inputs.project_id }}
        INPUT_REGION: ${{ inputs.region }}
        INPUT_REPO_NAME: ${{ inputs.repo_name }}
        INPUT_DEPLOY_TAG: ${{ inputs.deploy_tag }}
        TERRAFORM_DIR: ${{ github.action_path }}/../../project-terraform/services
      run: |
        active=$(node ./deploy-services/list-active-environments.ts)
        existing=$(terraform -chdir="$TERRAFORM_DIR" workspace list | sed 's/^\*\?\s*//' | grep -v '^$')

        echo "Active environments: $(echo $active | tr '\n' ', ' | sed 's/,$//')"
        echo "Existing environments: $(echo $existing | tr '\n' ', ' | sed 's/,$//')"

        for environ in $existing; do
          if ! echo "$active" | grep -qw "$environ"; then
            # Check if environment is deletable -- bail/fail fast before terraform
            if ! INPUT_BRANCH=$environ node ./shared/check-env-deletable.ts; then
              echo "::warning::Skipping environment $environ: not deletable"
              continue
            fi

            if [[ "${{ inputs.command }}" != "apply" ]]; then
              echo "Would delete environment: $environ"
              continue
            fi

            echo "Deleting environment: $environ"
            if (
              # Generate tfvars and apply in case deletion_protection changed
              INPUT_ENVIRONMENT=$environ node ./deploy-services/index.ts &&
              terraform -chdir="$TERRAFORM_DIR" workspace select "$environ" &&
              terraform -chdir="$TERRAFORM_DIR" apply -input=false -auto-approve &&
              terraform -chdir="$TERRAFORM_DIR" destroy -input=false -auto-approve &&
              terraform -chdir="$TERRAFORM_DIR" workspace select default &&
              terraform -chdir="$TERRAFORM_DIR" workspace delete "$environ"
            ); then
              echo "Successfully deleted environment: $environ"
            else
              echo "::warning::Failed to delete environment: $environ"
              terraform -chdir="$TERRAFORM_DIR" workspace select default || true
            fi
          fi
        done

branding:
  icon: settings
  color: purple
