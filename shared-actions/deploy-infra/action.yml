name: Skiff2 Deploy Infra
description: Transforms skiff2.json config into Terraform variables and runs terraform plan or apply for shared infrastructure (LB, URL map, NEGs, SSL)
author: Skiff

inputs:
  project_id:
    description: "GCP project ID"
    required: true
  config_file:
    description: "Path to skiff2.json config file (relative to calling repo root)"
    required: false
    default: "skiff2.json"
  region:
    description: "GCP region"
    required: false
    default: "us-west1"
  command:
    description: "Terraform command to run: 'plan' or 'apply'"
    required: false
    default: "plan"
  use_classic_load_balancer:
    description: "Use the Classic Application Load Balancer instead of the Global Application Load Balancer"
    required: false
    default: false

outputs:
  default_url:
    description: "Default load balancer URL for the project"
    value: ${{ steps.transform.outputs.default_url }}

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Install action dependencies
      shell: bash
      working-directory: ${{ github.action_path }}/../
      run: npm ci

    - name: Transform config to Terraform variables
      id: transform
      shell: bash
      working-directory: ${{ github.action_path }}/../
      env:
        INPUT_CONFIG_FILE: ${{ inputs.config_file }}
        INPUT_PROJECT_ID: ${{ inputs.project_id }}
        INPUT_REGION: ${{ inputs.region }}
        TERRAFORM_DIR: ${{ github.action_path }}/../../project-terraform/infra
        INPUT_USE_CLASSIC_LOAD_BALANCER: ${{ inputs.use_classic_load_balancer }}
      run: node ./deploy-infra/index.ts

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4

    - name: Terraform Init
      shell: bash
      working-directory: ${{ github.action_path }}/../../project-terraform/infra
      run: terraform init -backend-config="bucket=${{ inputs.project_id }}-tf-state"

    - name: Terraform ${{ inputs.command == 'apply' && 'Apply' || 'Plan' }}
      id: terraform
      shell: bash
      working-directory: ${{ github.action_path }}/../../project-terraform/infra
      run: |
        if [ "${{ inputs.command }}" = "apply" ]; then
          # Pre-create backends before the URL map references them (handles new branch envs
          # and custom domains). Allow failure: GCP rejects backend deletion while the URL
          # map still references it — the URL map step removes the ref, full apply retries.
          terraform apply -target=module.lb-http.google_compute_backend_service.default -input=false -auto-approve || true
          if terraform state show google_compute_url_map.default &>/dev/null; then
            # for existing project: update url map (adds new refs, removes old refs)
            terraform apply -target=google_compute_url_map.default -input=false -auto-approve
          fi
          terraform apply -input=false -auto-approve
        else
          terraform plan -input=false
        fi

branding:
  icon: settings
  color: purple
