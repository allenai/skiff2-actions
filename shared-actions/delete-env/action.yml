name: Skiff2 Delete Environment
description: Destroys Cloud Run services and Terraform workspace for a branch environment
author: Skiff

inputs:
  project_id:
    description: "GCP project ID"
    required: true
  config_file:
    description: "Path to skiff2.json config file"
    required: false
    default: "skiff2.json"
  region:
    description: "GCP region"
    required: false
    default: "us-west1"
  repo_name:
    description: "Repository name (defaults to github.event.repository.name)"
    required: false
    default: ${{ github.event.repository.name }}
  branch:
    description: "Branch name to clean up"
    required: false
    default: ${{ github.event.ref }}

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Install action dependencies
      shell: bash
      working-directory: ${{ github.action_path }}/../
      run: npm ci

    - name: Resolve workspace name
      id: workspace
      shell: bash
      working-directory: ${{ github.action_path }}/../
      env:
        INPUT_BRANCH: ${{ inputs.branch }}
      run: node ./delete-env/resolve-branch.ts

    - name: Check if environment is deletable
      id: check
      shell: bash
      working-directory: ${{ github.action_path }}/../
      env:
        INPUT_CONFIG_FILE: ${{ inputs.config_file }}
        INPUT_BRANCH: ${{ inputs.branch }}
      run: node ./shared/check-env-deletable.ts

    - name: Fail if not deletable
      if: steps.check.outputs.deletable != 'true'
      shell: bash
      run: |
        echo "::error::${{ steps.check.outputs.reason }}"
        exit 1

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      shell: bash
      working-directory: ${{ github.action_path }}/../../project-terraform/services
      run: terraform init -backend-config="bucket=${{ inputs.project_id }}-tf-state"

    - name: Delete environment
      shell: bash
      working-directory: ${{ github.action_path }}/../
      env:
        WORKSPACE: ${{ steps.workspace.outputs.workspace }}
        INPUT_CONFIG_FILE: ${{ inputs.config_file }}
        INPUT_PROJECT_ID: ${{ inputs.project_id }}
        INPUT_REGION: ${{ inputs.region }}
        INPUT_REPO_NAME: ${{ inputs.repo_name }}
        INPUT_ENVIRONMENT: ${{ inputs.branch }}
        INPUT_DEPLOY_TAG: placeholder
        TERRAFORM_DIR: ${{ github.action_path }}/../../project-terraform/services
      run: |
        if ! terraform -chdir="$TERRAFORM_DIR" workspace list | grep -qw "$WORKSPACE"; then
          echo "Workspace '$WORKSPACE' does not exist, nothing to clean up"
          exit 0
        fi

        echo "Deleting environment: $WORKSPACE"

        # Generate tfvars and apply to ensure deletion_protection is disabled.
        # This handles the case where a long-lived env (with "auto" deletion_protection)
        # was removed from environments and is now being cleaned up.
        node ./deploy-services/index.ts
        terraform -chdir="$TERRAFORM_DIR" workspace select "$WORKSPACE"
        terraform -chdir="$TERRAFORM_DIR" apply -input=false -auto-approve

        # Now destroy
        if (
          terraform -chdir="$TERRAFORM_DIR" destroy -input=false -auto-approve &&
          terraform -chdir="$TERRAFORM_DIR" workspace select default &&
          terraform -chdir="$TERRAFORM_DIR" workspace delete "$WORKSPACE"
        ); then
          echo "Successfully deleted environment: $WORKSPACE"
        else
          echo "::warning::Failed to delete environment: $WORKSPACE"
          terraform -chdir="$TERRAFORM_DIR" workspace select default || true
        fi

branding:
  icon: trash-2
  color: red
