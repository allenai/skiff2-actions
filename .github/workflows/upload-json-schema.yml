on:
  push:
    branches:
      - main
      - upload-json-schema

jobs:
  upload-json-schema:
    name: Upload JSON Schema
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - id: checkout
      uses: 'actions/checkout@v4'

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install dependencies
      run: npm ci

    - id: create-schema
      name: Create JSON Schema
      run: npm run create-json-schema

    - id: 'auth'
      uses: 'google-github-actions/auth@v3'
      with:
        project_id: ${{ vars.SKIFF2_PROJECT_ID }}
        workload_identity_provider: ${{ vars.SKIFF2_WORKLOAD_IDENTITY_PROVIDER }}

    - id: 'upload-file'
      uses: 'google-github-actions/upload-cloud-storage@v3'
      with:
        project_id: ai2-skiff-2 
        path: '${{ github.workspace }}/skiff2-config.schema.json'
        parent: false
        destination: 'skiff2-general'